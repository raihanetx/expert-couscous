name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: faceup-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: faceup-release
        path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: faceup-debug
        path: ./apk-debug

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: faceup-release
        path: ./apk-release

    - name: Get version info
      id: version
      run: |
        VERSION_NAME="1.0.0"
        VERSION_CODE="1"
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version_name }}-${{ github.run_number }}
        name: FaceUp v${{ steps.version.outputs.version_name }} Build ${{ github.run_number }}
        body: |
          ## FaceUp Video Calling App
          
          ### Build Info
          - **Version:** ${{ steps.version.outputs.version_name }}
          - **Build Number:** ${{ github.run_number }}
          - **Commit:** ${{ github.sha }}
          
          ### Downloads
          - `app-debug.apk` - Debug build (for testing)
          - `app-release.apk` - Release build (unsigned)
          
          ### Installation
          1. Download the APK file
          2. Enable "Install from unknown sources" in your Android settings
          3. Open the APK file to install
        files: |
          ./apk-debug/app-debug.apk
          ./apk-release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
