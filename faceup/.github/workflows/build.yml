name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Debug - List files
      run: |
        echo "=== Project Structure ==="
        find . -type f -name "*.kt" | head -20
        echo "=== Gradle files ==="
        ls -la gradle/wrapper/
        echo "=== gradlew ==="
        head -5 gradlew
        echo "=== gradle-wrapper.properties ==="
        cat gradle/wrapper/gradle-wrapper.properties

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Find APK files
      if: always()
      run: find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: faceup-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    permissions:
      contents: write
    
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: faceup-debug-apk
        path: ./apk

    - name: Get date
      id: date
      run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0-${{ steps.date.outputs.date }}
        name: FaceUp v1.0.0 - Build ${{ steps.date.outputs.date }}
        body: |
          ## FaceUp Video Calling App
          **Version:** 1.0.0
          **Build Date:** ${{ steps.date.outputs.date }}
        files: ./apk/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
